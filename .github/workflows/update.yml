# GitHub Actions: 週1回データを自動更新してコミット。Pagesが自動で再デプロイされる。
name: update-data
on:
  schedule:
    - cron: "0 23 * * 5"     # 毎週 土曜 08:00 JST（金曜の米国市場クローズ後）
  workflow_dispatch: {}        # スマホからの手動更新用（Actions → Run workflow）
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install yfinance pandas
      - run: python fetch_data.py
      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json data.js
          git diff --cached --quiet || git commit -m "data update"
          git push
